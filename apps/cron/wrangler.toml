name = "baromontres-cron"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# Daily at 04:17 UTC. Override locally with `wrangler dev --test-scheduled`.
[triggers]
crons = ["17 4 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "baromontres"
# Replace with the real D1 database id after `wrangler d1 create baromontres`.
database_id = "REPLACE_WITH_D1_ID"

# Set with: wrangler secret put ANTHROPIC_API_KEY
# vars are not used; secrets only.

[vars]
SCRAPE_LIMIT = "200"
ENRICH_LIMIT = "20"
USER_AGENT   = "baromontres/2.0 (+https://github.com/onepau/baromontres)"
SOURCE_BASE  = "https://www.businessmontres.com"
